<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="css/SignUp.css"/>
</head>
<body>
    <div class="container">
        <img src="img/polygon-scatter-haikei.png"/>
        <div class="box">
           <div class="sbox1">
            <h2 align="center">Sign Up</h2>
           </div>
           <div class="sbox2">
            <label >Enter Email</label>
            <input type="email" placeholder="Enter your email" autocomplete="off"/>

            <label >Password</label>
           <input type="password" placeholder="Create your password" autocomplete="off"/>
           
           <label >Contact</label>
           <input type="text" placeholder="Enter your contact" autocomplete="off"/>
           
           <input type="submit" id="submit" value="Submit" />
           
    </div>
</body>
</html>
